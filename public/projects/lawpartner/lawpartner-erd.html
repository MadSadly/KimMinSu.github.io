.nn{display:inline-block;font-size:7.5px;color:#999;font-weight:700;margin-left:2px;vertical-align:middle}
svg.ov{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:1}
.zone-label{position:absolute;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.25;pointer-events:none;z-index:0}

  {f:'AI채팅방',      fc:'채팅방번호', t:'AI채팅이력',     tc:'채팅방번호',  seq:14},
  // 채팅방
  {f:'채팅방',        fc:'채팅방ID',   t:'채팅메시지',     tc:'채팅방ID',    seq:15},
  {f:'채팅방',        fc:'채팅방ID',   t:'알림',           tc:'채팅방ID',    seq:16},
  // 게시판
  {f:'상담게시판',    fc:'게시글번호', t:'게시판첨부파일', tc:'게시글번호',  seq:17},
  {f:'상담게시판',    fc:'게시글번호', t:'변호사답변',     tc:'게시글번호',  seq:18},
];

// ── FK 단절 점선 ───────────────────────────────────────────────
const CUTS=[
  {f:'채팅방', fc:'채팅방ID', t:'사건일정', tc:'채팅방ID', seq:50},
];

// ── 헬퍼 ──────────────────────────────────────────────────────
const TM={};
TBLS.forEach(t=>TM[t.id]=t);
function rowY(t,col){
  const i=t.cols.findIndex(c=>c.n===col);
  return t.y+HH+(i<0?0:i)*RH+RH/2;
}

// ══════════════════════════════════════════════════════════════
// 라우팅 엔진 — Y-sorted lane assignment
// 원칙:
//   1. 컬럼 쌍 사이 gutter 에 레인 풀 사전 생성
//   2. 각 gutter 를 통과하는 연결선을 midY 기준으로 정렬
//   3. 정렬 순서대로 레인 왼→오른 순 배정 → 선 교차 최소화
//   4. 같은 열 연결: COL0 왼쪽 / COL1~4 오른쪽 바깥 우회
// ══════════════════════════════════════════════════════════════

// 컬럼 경계 (right edge of each col)
// ══════════════════════════════════════════════════════════════
// 라우팅 엔진
// 원칙:
//   1. gutter 레인 풀 사전 생성 (각 컬럼 쌍 사이 빈 공간)
//   2. 수직 세그먼트가 반드시 gutter 안에서만 주행 → 테이블 관통 원천 차단
//   3. 같은 열 연결: 오른쪽 gutter 짧은 스텁 (gutter 내부)
//   4. Y-sorted 레인 배정으로 선 교차 최소화
// ══════════════════════════════════════════════════════════════

// 각 gutter 범위 (테이블이 없는 빈 공간, 폭 = GUTTER_W)
const GUTTERS = [
  {lo:C0+TW, hi:C1},    // 0-1
  {lo:C1+TW, hi:C2},    // 1-2
  {lo:C2+TW, hi:C3},    // 2-3
  {lo:C3+TW, hi:C4},    // 3-4
];
const MARGIN = 4; // gutter 양쪽 여백

// gutter 안에 n개 수직 레인 균등 배치 (그룹 연결 수 = 레인 수 → 동일 gutter 내 X 재사용 없음)
function buildLanes(g, n) {
  n = Math.max(n, 1);
  const lo = g.lo + MARGIN, hi = g.hi - MARGIN;
  const inner = hi - lo;
  const step = inner / (n + 1);
  return Array.from({length:n}, (_,i) => Math.round(lo + step*(i+1)));
}
const LEFT_GUTTER = { lo: C0 - 72, hi: C0 - 8 };

function gutterForStubCol(col) {
  if (col >= 0 && col < GUTTERS.length) return GUTTERS[col];
  return { lo: C4 + TW, hi: C4 + TW + GUTTER_W };
}

function colOf(t) {
  if (t.x <= C0+5) return 0;
  if (t.x <= C1+5) return 1;
  if (t.x <= C2+5) return 2;
  if (t.x <= C3+5) return 3;
  return 4;
}

// 수직 세그먼트가 어떤 gutter를 써야 하는지 결정
// F→T 연결에서 두 테이블 사이의 모든 gutter 를 통과해야 함
// 하지만 H-V-H 경로는 단 하나의 midX만 사용 → 두 테이블 사이 첫 번째 gutter 사용
function gutterKeyBetween(fc, tc) {
  const lo = Math.min(fc, tc), hi = Math.max(fc, tc);
  if (lo === hi) return `stub${lo}`;  // 같은 열
  return `g${lo}`;  // lo 열의 오른쪽 gutter
}

// 레인 배정
const laneAssign = new Map();

function assignAllLanes(allConns) {
  const groups = {};
  allConns.forEach((c, i) => {
    const F=TM[c.f], T=TM[c.t];
    if (!F||!T) return;
    const y1=rowY(F,c.fc), y2=rowY(T,c.tc);
    const fc=colOf(F), tc=colOf(T);
    const key = gutterKeyBetween(fc, tc);
    if (!groups[key]) groups[key]=[];
    groups[key].push({id:i, y1, y2, midY:(y1+y2)/2, fc, tc});
  });

  Object.entries(groups).forEach(([key, items]) => {
    items.sort((a,b)=>a.midY-b.midY);
    const need = Math.max(items.length, 1);
    let pool;
    if (key.startsWith('g')) {
      pool = buildLanes(GUTTERS[+key.slice(1)], need);
    } else if (key.startsWith('stub')) {
      const col = +key.slice(4);
      pool = buildLanes(gutterForStubCol(col), need);
    } else {
      pool = buildLanes(LEFT_GUTTER, need);
    }
    items.forEach((item, rank) => {
      laneAssign.set(item.id, {
        val: pool[rank],
        key, fc:item.fc, tc:item.tc, y1:item.y1, y2:item.y2
      });
    });
  });
}

function getPath(connIdx) {
  const c = allConns[connIdx];
  const F=TM[c.f], T=TM[c.t];
  if (!F||!T) return '';
  const y1=rowY(F,c.fc), y2=rowY(T,c.tc);
  const FR=F.x+TW, FL=F.x, TR=T.x+TW, TL=T.x;
  const fc=colOf(F), tc=colOf(T);
  const info = laneAssign.get(connIdx);
  if (!info) return '';
  const {val, key} = info;

  // 같은 열 → 오른쪽 gutter 내 절대 X (buildLanes)
  if (key.startsWith('stub')) {
    const stubX = val;
    return `M${FR},${y1} H${stubX} V${y2} H${TR}`;
  }
  // 왼쪽 우회
  if (key === 'left') {
    return `M${FL},${y1} H${val} V${y2} H${TL}`;
  }
  // 다른 열 → midX = gutter 안의 레인 X (절대값)
  if (FR+2 <= TL) return `M${FR},${y1} H${val} V${y2} H${TL}`;
  if (TR+2 <= FL) return `M${FL},${y1} H${val} V${y2} H${TR}`;
  // fallback
  return `M${FR},${y1} H${val} V${y2} H${TR}`;
}

// ── 전체 연결 목록 + 레인 배정 실행 ──────────────────────────
const allConns = [...RELS, ...CUTS];
assignAllLanes(allConns);

// ── 테이블 렌더링 ──────────────────────────────────────────────
const canvas=document.getElementById('canvas');

TBLS.forEach(t=>{
  const el=document.createElement('div');
  el.className='tbl';
  const hdr=HDR[t.d]||'#3a6ea8';
  el.style.cssText=`left:${t.x}px;top:${t.y}px;width:${TW}px`;
  let html=`<div class="th" style="background:${hdr}">
    <span class="th-name">${t.id}</span>
    <span class="th-cnt">${t.cols.length}</span>
  </div>`;
  t.cols.forEach(col=>{
    const isPK=!!col.pk,isFK=!!col.fk,isNL=!!col.nolink;
    const ico=isPK?`<span class="row-ico pk-ico">▶</span>`:
              (isFK||isNL)?`<span class="row-ico fk-ico">◆</span>`:
              `<span class="row-ico"></span>`;
    const nc=isPK?'row-name is-pk':isFK?'row-name is-fk':isNL?'row-name is-nolink':'row-name';
    const nn=col.nn?`<span class="nn">NN</span>`:'';
    html+=`<div class="row">${ico}<span class="${nc}">${col.n}${nn}</span><span class="row-type">${col.t}</span></div>`;
  });
  el.innerHTML=html;
  canvas.appendChild(el);
});

// ── 캔버스 크기 자동 계산 ──────────────────────────────────────
(function sizeCanvas(){
  let maxB=800, maxR=800;
  TBLS.forEach(t=>{maxB=Math.max(maxB,t.y+tH(t));maxR=Math.max(maxR,t.x+TW);});
  canvas.style.height=(maxB+60)+'px';
  canvas.style.width= (maxR+60)+'px';
})();

// ── SVG 선 그리기 ──────────────────────────────────────────────
const svg=document.getElementById('lines');
const FK_COLOR='#b0c4d8', FK_W=1.4;

RELS.forEach((r,i)=>{
  const d=getPath(i);
  if(!d)return;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);
  p.setAttribute('stroke',FK_COLOR);
  p.setAttribute('stroke-width',FK_W);
  p.setAttribute('fill','none');
  p.setAttribute('marker-start','url(#mk-dot)');
  p.setAttribute('marker-end','url(#mk-dot)');
  svg.appendChild(p);
});

CUTS.forEach((r,i)=>{
  const d=getPath(RELS.length+i);
  if(!d)return;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);
  p.setAttribute('stroke','#b8c8d8');
  p.setAttribute('stroke-width','1.1');
  p.setAttribute('stroke-dasharray','5,3');
  p.setAttribute('fill','none');
  p.setAttribute('marker-end','url(#mk-cut)');
  svg.appendChild(p);
});


</script>
</body>
